<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magic Shadows ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Nunito:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #050b1a;
      --deep:   #080f22;
      --card:   #0b1630;
      --card2:  #0e1c3a;
      --white:  #eaf6ff;
      --soft:   #a8d8f0;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--navy);
      color: var(--white);
      font-family: 'Nunito', sans-serif;
      overflow-x: hidden;
    }

    /* ── Stars ── */
    .stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(1px   1px   at 10% 15%, rgba(255,255,255,.8) 0%, transparent 100%),
        radial-gradient(1px   1px   at 25% 60%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 30%, rgba(56,216,245,.9)  0%, transparent 100%),
        radial-gradient(1px   1px   at 55% 80%, rgba(255,255,255,.7) 0%, transparent 100%),
        radial-gradient(1px   1px   at 70% 20%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 80% 55%, rgba(56,216,245,.8)  0%, transparent 100%),
        radial-gradient(1px   1px   at 90% 10%, rgba(255,255,255,.9) 0%, transparent 100%),
        radial-gradient(1px   1px   at 15% 90%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1px   1px   at 60% 45%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 33% 75%, rgba(56,216,245,.7)  0%, transparent 100%),
        radial-gradient(1px   1px   at 88% 85%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px   1px   at  5% 50%, rgba(255,255,255,.8) 0%, transparent 100%),
        radial-gradient(1px   1px   at 75% 70%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1px   1px   at 48% 10%, rgba(255,255,255,.7) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 92% 40%, rgba(56,216,245,.6)  0%, transparent 100%);
    }

    /* ── Hero ── */
    .hero {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      background: radial-gradient(ellipse at 50% 0%, rgba(0,200,255,.12) 0%, transparent 60%);
    }

    .hero::before {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, #38d8f5, transparent);
    }

    .hero-sparkle {
      font-size: 1.1rem; letter-spacing: .3em; text-transform: uppercase;
      color: #38d8f5; margin-bottom: 1rem; opacity: .8;
    }

    .hero h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2.5rem, 8vw, 5.5rem); font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, #38d8f5 50%, #4fa8e8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 30px rgba(56,216,245,.5));
      line-height: 1.1; margin-bottom: 1.2rem;
    }

    .hero p {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: var(--soft); max-width: 560px; line-height: 1.7; margin-bottom: 2.5rem;
    }

    .hero-gem {
      width: 60px; height: 60px; margin-bottom: 1.5rem;
      background: radial-gradient(circle at 35% 35%, #fff, #38d8f5 50%, #1a4a8a);
      clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
      filter: drop-shadow(0 0 20px #38d8f5);
      animation: gemPulse 3s ease-in-out infinite;
    }

    @keyframes gemPulse {
      0%,100% { filter: drop-shadow(0 0 20px #38d8f5); transform: scale(1); }
      50%      { filter: drop-shadow(0 0 40px #00c8ff); transform: scale(1.08); }
    }

    .scroll-hint {
      position: absolute; bottom: 2rem;
      display: flex; flex-direction: column; align-items: center; gap: .4rem;
      font-size: .8rem; color: var(--soft); opacity: .6; letter-spacing: .15em;
      animation: bounce 2s ease-in-out infinite;
    }
    .scroll-hint::after { content: '▼'; font-size: 1.2rem; color: #38d8f5; }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(6px); }
    }

    /* ── Nav ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(5,11,26,.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(56,216,245,.15);
      display: flex; justify-content: center; gap: 1rem;
      padding: .75rem 1rem; flex-wrap: wrap;
    }

    nav a {
      font-family: 'Cinzel Decorative', serif;
      font-size: .75rem; color: var(--soft); text-decoration: none;
      letter-spacing: .1em; padding: .4rem .8rem; border-radius: 20px;
      border: 1px solid transparent; transition: all .2s;
    }
    nav a:hover {
      color: #38d8f5; border-color: rgba(56,216,245,.4);
      background: rgba(56,216,245,.08); text-shadow: 0 0 10px #38d8f5;
    }

    /* ── Shared section shell ── */
    main { position: relative; z-index: 1; }

    .character-section {
      padding: 5rem 1.5rem;
      border-bottom: 1px solid rgba(56,216,245,.1);
    }
    .character-section:nth-child(even) {
      background: linear-gradient(180deg, transparent, rgba(10,20,50,.4), transparent);
    }
    .section-inner { max-width: 1100px; margin: 0 auto; }

    /* ── Character card internals (generated by JS) ── */
    .char-label {
      font-size: .75rem; letter-spacing: .4em; text-transform: uppercase;
      margin-bottom: .6rem; opacity: .8;
    }
    .char-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      filter: drop-shadow(0 0 20px rgba(56,216,245,.4));
      margin-bottom: 2.5rem;
      background: linear-gradient(135deg, #fff, var(--accent, #38d8f5));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .intro-card {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 3rem; align-items: center; margin-bottom: 3rem;
    }
    @media (max-width: 700px) { .intro-card { grid-template-columns: 1fr; } }

    .intro-img-wrap {
      position: relative; border-radius: 20px; overflow: hidden;
      border: 2px solid rgba(56,216,245,.3);
      box-shadow: 0 0 40px rgba(0,200,255,.2), 0 0 80px rgba(0,200,255,.08);
    }
    .intro-img-wrap img { width: 100%; display: block; transition: transform .4s ease; }
    .intro-img-wrap:hover img { transform: scale(1.04); }
    .intro-img-wrap::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 60%, rgba(5,11,26,.7));
      pointer-events: none;
    }

    .img-placeholder {
      width: 100%; aspect-ratio: 1/1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(11,22,48,.8); color: rgba(255,255,255,.3);
      font-size: .9rem; gap: .5rem; letter-spacing: .1em;
    }
    .img-placeholder span { font-size: 2rem; opacity: .4; }

    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem 1.5rem; }
    .stat {
      background: var(--card); border: 1px solid rgba(56,216,245,.15);
      border-radius: 12px; padding: .7rem 1rem; transition: border-color .2s, box-shadow .2s;
    }
    .stat:hover { border-color: rgba(56,216,245,.4); box-shadow: 0 0 15px rgba(56,216,245,.1); }
    .stat-label {
      font-size: .7rem; text-transform: uppercase; letter-spacing: .15em;
      opacity: .8; margin-bottom: .2rem;
    }
    .stat-value { font-weight: 700; font-size: .95rem; color: var(--white); }
    .stat.wide { grid-column: span 2; }
    .stat.missing .stat-value { color: rgba(255,255,255,.3); font-style: italic; font-weight: 400; }

    .powers-list { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .4rem; }
    .power-tag {
      border-radius: 20px; padding: .25rem .75rem;
      font-size: .8rem; white-space: nowrap;
    }

    .story-box {
      background: var(--card); border-radius: 16px;
      border: 1px solid rgba(56,216,245,.15);
      padding: 1.5rem 2rem; margin-top: 1.5rem;
      line-height: 1.8; color: var(--soft); font-size: .95rem; position: relative;
    }
    .story-box::before {
      content: '✦'; position: absolute; top: -12px; left: 1.5rem;
      background: var(--navy); padding: 0 .5rem; font-size: 1.2rem;
    }
    .story-box.missing {
      color: rgba(255,255,255,.25); font-style: italic; text-align: center; padding: 2rem;
    }

    .gem-divider {
      display: flex; align-items: center; gap: 1rem; margin: 2rem 0;
    }
    .gem-divider::before, .gem-divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(56,216,245,.3), transparent);
    }
    .gem-icon {
      width: 16px; height: 16px;
      background: radial-gradient(circle at 35% 35%, #fff, #38d8f5 60%, #1a4a8a);
      clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
      filter: drop-shadow(0 0 6px #38d8f5);
    }

    .forms-section-title {
      font-family: 'Cinzel Decorative', serif; font-size: 1.1rem;
      margin: 2.5rem 0 1rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .forms-section-title::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(56,216,245,.4), transparent);
    }

    .forms-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.2rem;
    }

    .form-card {
      background: var(--card); border: 1px solid rgba(56,216,245,.15);
      border-radius: 16px; overflow: hidden; transition: transform .3s, border-color .3s, box-shadow .3s;
      cursor: pointer;
    }
    .form-card:hover {
      transform: translateY(-6px); border-color: rgba(56,216,245,.5);
      box-shadow: 0 10px 40px rgba(0,200,255,.2);
    }
    .form-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
    .form-card .form-placeholder {
      width: 100%; aspect-ratio: 1/1;
      display: flex; align-items: center; justify-content: center;
      background: rgba(11,22,48,.8); flex-direction: column; gap: .4rem;
      color: rgba(255,255,255,.2); font-size: .75rem; letter-spacing: .1em;
    }
    .form-card .form-placeholder span { font-size: 1.8rem; opacity: .3; }
    .form-card-label {
      padding: .6rem 1rem; font-size: .8rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em; text-align: center;
    }

    /* ── Lightbox ── */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.85); backdrop-filter: blur(8px);
      align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw; max-height: 90vh; border-radius: 16px;
      border: 2px solid rgba(56,216,245,.5); box-shadow: 0 0 60px rgba(0,200,255,.3);
    }
    .lightbox-close {
      position: absolute; top: 1.5rem; right: 1.5rem;
      background: none; border: none; color: var(--white);
      font-size: 2rem; cursor: pointer; opacity: .7; transition: opacity .2s;
    }
    .lightbox-close:hover { opacity: 1; }

    /* ── Footer ── */
    footer {
      position: relative; z-index: 1; text-align: center; padding: 3rem 1rem;
      border-top: 1px solid rgba(56,216,245,.1);
      color: var(--soft); font-size: .85rem; opacity: .6;
    }
    footer span { font-family: 'Cinzel Decorative', serif; color: #38d8f5; opacity: 1; }
  </style>
</head>
<body>

<div class="stars"></div>

<!-- ══════════════ HERO ══════════════ -->
<section class="hero" id="top">
  <div class="hero-gem"></div>
  <p class="hero-sparkle">✦ a world of elves &amp; magic ✦</p>
  <h1>Magic Shadows</h1>
  <p>Step into a realm where moonstone magic crackles through ancient elven forests and power runs deeper than anyone can explain.</p>
  <div class="scroll-hint">scroll</div>
</section>

<!-- ══════════════ NAV ══════════════ -->

<!-- ══════════════ WEB COMPONENT ══════════════ -->
<script>
  /* ─── <char-form> — purely a data carrier, renders nothing itself ─── */
  class CharForm extends HTMLElement {}
  customElements.define('char-form', CharForm);

  /* ─── <character-card> — full character section ─── */
  class CharacterCard extends HTMLElement {

    /*
     * SUPPORTED ATTRIBUTES (superset across all characters):
     *
     *  id            – anchor id for nav links
     *  index         – display number e.g. "01"
     *  name          – character name
     *  creature      – species / race
     *  age           – numeric age
     *  skill         – unique origin of power / skill note
     *  powers        – comma-separated list of powers
     *  equipment     – weapons / items
     *  gem           – gem type
     *  elven-status  – royal or family status in elven hierarchy
     *  flaw          – character flaw description
     *  story         – biography / personality paragraph
     *  cover         – path to main cover image (empty = placeholder)
     *  accent        – CSS hex color for this character's theme
     */

    connectedCallback() {
      const a = (name) => this.getAttribute(name) || '';

      const accent  = a('accent')  || '#38d8f5';
      const name    = a('name')    || 'Unknown';
      const index   = a('index')   || '??';
      const cover   = a('cover');
      const powers  = a('powers').split(',').map(p => p.trim()).filter(Boolean);
      const story   = a('story');

      /* ── Collect child <char-form> elements and group by section ── */
      const forms = [...this.querySelectorAll('char-form')];
      const sections = {};
      forms.forEach(f => {
        const sec = f.getAttribute('section') || 'Other';
        if (!sections[sec]) sections[sec] = [];
        sections[sec].push({
          label: f.getAttribute('label') || '',
          src:   f.getAttribute('src')   || ''
        });
      });

      /* ── Helper: stat cell ── */
      const stat = (label, value, wide = false) => {
        const missing = !value;
        const display = value || 'Coming soon…';
        return `
          <div class="stat${wide ? ' wide' : ''}${missing ? ' missing' : ''}">
            <div class="stat-label" style="color:${accent}">${label}</div>
            <div class="stat-value">${display}</div>
          </div>`;
      };

      /* ── Helper: power tags ── */
      const powerTags = powers.length
        ? `<div class="powers-list">${powers.map(p =>
            `<span class="power-tag" style="
              background:${accent}22;
              border:1px solid ${accent}55;
              color:${accent}">✦ ${p}</span>`
          ).join('')}</div>`
        : `<div class="stat-value missing" style="font-style:italic;color:rgba(255,255,255,.3)">Coming soon…</div>`;

      /* ── Helper: cover image or placeholder ── */
      const coverHtml = cover
        ? `<div class="intro-img-wrap"><img src="${cover}" alt="${name} — main" loading="lazy" /></div>`
        : `<div class="intro-img-wrap">
             <div class="img-placeholder">
               <span>✦</span>
               Art coming soon
             </div>
           </div>`;

      /* ── Helper: form gallery sections ── */
      const galleriesHtml = Object.entries(sections).map(([secLabel, items]) => {
        const cards = items.map(item => {
          const imgHtml = item.src
            ? `<img src="${item.src}" alt="${item.label}" loading="lazy" onclick="openLightbox('${item.src}')" />`
            : `<div class="form-placeholder"><span>✦</span>Coming soon</div>`;
          const clickable = item.src ? `onclick="openLightbox('${item.src}')"` : '';
          return `
            <div class="form-card" ${clickable} style="--char-accent:${accent}">
              ${imgHtml}
              <div class="form-card-label" style="color:${accent}">${item.label}</div>
            </div>`;
        }).join('');

        return `
          <div class="forms-section-title" style="color:${accent}">${secLabel}</div>
          <div class="forms-grid">${cards}</div>`;
      }).join('');

      /* ── Story box ── */
      const storyHtml = story
        ? `<div class="story-box" style="border-color:${accent}33">
             <style>.story-box::before{color:${accent}}</style>
             ${story}
           </div>`
        : `<div class="story-box missing">✦ Story coming soon ✦</div>`;

      /* ── Build full section HTML ── */
      const html = `
        <section class="character-section">
          <div class="section-inner">
            <p class="char-label" style="color:${accent}">Character ${index}</p>
            <h2 class="char-title" style="--accent:${accent}">${name}</h2>

            <div class="intro-card">
              ${coverHtml}
              <div>
                <div class="stat-grid">
                  ${stat('Creature',      a('creature'))}
                  ${stat('Age',           a('age'))}
                  ${stat('Gem',           a('gem'))}
                  ${stat('Elven Status',  a('elven-status'))}
                  ${stat('Equipment',     a('equipment'))}
                  ${stat('Skill Origin',  a('skill'))}
                  <div class="stat wide">
                    <div class="stat-label" style="color:${accent}">Powers</div>
                    ${powerTags}
                  </div>
                  <div class="stat wide${a('flaw') ? '' : ' missing'}">
                    <div class="stat-label" style="color:${accent}">Flaw</div>
                    <div class="stat-value" style="font-weight:400;font-size:.9rem;color:#c8a8e8">
                      ${a('flaw') || 'Coming soon…'}
                    </div>
                  </div>
                </div>
              </div>
            </div>

            ${storyHtml}

            <div class="gem-divider">
              <div class="gem-icon" style="background:radial-gradient(circle at 35% 35%,#fff,${accent} 60%,#1a4a8a);filter:drop-shadow(0 0 6px ${accent})"></div>
            </div>

            ${galleriesHtml}
          </div>
        </section>`;

      /* Replace the custom element's own markup with a plain div wrapper */
      const wrapper = document.createElement('div');
      wrapper.innerHTML = html;
      this.replaceWith(wrapper);
    }
  }
  customElements.define('character-card', CharacterCard);

  /* ─── Lightbox ─── */
  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>

</body>
</html>
