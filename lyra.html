    story="Lyra is the daughter of the half-elf who once betrayed the elven kingdom — and she inherited every bit of her parent's hatred, then made it her own. She is wicked, cunning, and utterly consumed by revenge against all elves and humans alike. The dark magic she has wielded for so long has begun to change her physically, twisting her human side until it became something closer to a bat. She is vain, envious, and ruthless — caring only for what benefits herself. An amulet hangs around her neck at all times, its power unknown even to those closest to her. She has been growing bolder, her attacks more frequent. Whether our heroes can stop her before it's too late… that's the real question. 🖤"
