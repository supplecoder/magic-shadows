<main>
  <div class="locations-section">
    <div class="locations-inner">
      <p class="locations-subheading">✦ The World ✦</p>
      <h2 class="locations-heading">Locations</h2>

      <div class="locations-grid">

        <location-card
          name="The Elven Castle"
          img="images/locations/elven-castle.png"
          description="The ancient seat of elven royalty — grand, luminous, and surrounded by crystal spires that catch the light of every moon. Home to the Queen and Moon, and the heart of elven power."
          accent="#38d8f5"
        ></location-card>

        <location-card
          name="The Throne Room"
          img="images/locations/throne-room.png"
          description="Where the Queen holds court and the fate of the realm is decided. Few are granted an audience here — and fewer still leave unchanged."
          accent="#c9a84c"
        ></location-card>

        <location-card
          name="The Training Room"
          img="images/locations/training-room.png"
          description="Where the heroes sharpen their powers, test their limits, and prepare for what's coming. Equal parts gruelling and exhilarating."
          accent="#4cbe8a"
        ></location-card>

        <location-card
          name="Stella &amp; Lucky's House"
          img="images/locations/stella-lucky-house.png"
          description="The home the storm-born twins grew up in — ordinary on the outside, full of warmth and chaos on the inside. The place where their adventure really began."
          accent="#e8634f"
        ></location-card>

        <location-card
          name="The Forest"
          img="images/locations/forest.png"
          description="Ancient and alive, the forest is threaded with magic older than any kingdom. Sunlight breaks through the canopy in golden beams, and something always seems to be watching from the shadows."
          accent="#4cbe8a"
        ></location-card>

        <location-card
          name="The Ice Cream Shop"
          img="images/locations/ice-cream-shop.png"
          description="A cheerful little shop tucked into the town square — the one place that feels completely normal in a world full of magic. The girls come here to breathe, laugh, and pretend everything is fine."
          accent="#f5a0c0"
        ></location-card>

      </div>
    </div>
  </div>
</main>

<footer>
  <span>Magic Shadows</span> &nbsp;·&nbsp; a world of elves &amp; moonstone magic ✦
